<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>你画我猜</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            overflow-x: hidden;
        }

        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        h1 {
            color: white;
            font-size: 32px;
            font-weight: 700;
            text-shadow: 0 4px 15px rgba(0,0,0,0.2);
            margin-bottom: 30px;
            text-align: center;
        }

        .game-modes {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 100%;
            max-width: 500px;
        }

        .mode-card {
            background: white;
            border-radius: 25px;
            padding: 25px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.15);
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
            border: none;
        }

        .mode-card:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 20px 60px rgba(0,0,0,0.25);
        }

        .mode-card:active {
            transform: translateY(-4px) scale(0.98);
        }

        .mode-card .icon {
            font-size: 56px;
            margin-bottom: 15px;
            transition: transform 0.3s ease;
        }

        .mode-card:hover .icon {
            transform: scale(1.1);
        }

        .mode-card h2 {
            margin-bottom: 12px;
            font-size: 22px;
            font-weight: 600;
        }

        .mode-card p {
            color: #666;
            font-size: 15px;
            line-height: 1.6;
            opacity: 0.85;
        }

        .mode-card.classic {
            background: linear-gradient(135deg, #ffffff 0%, #f8fafc 100%);
        }

        .mode-card.classic h2 {
            color: #667eea;
        }

        .mode-card.racing {
            background: linear-gradient(135deg, #fffbeb 0%, #fef3c7 100%);
        }

        .mode-card.racing h2 {
            color: #f59e0b;
        }

        .mode-card.duo {
            background: linear-gradient(135deg, #ecfdf5 0%, #d1fae5 100%);
        }

        .mode-card.duo h2 {
            color: #10b981;
        }

        .footer {
            margin-top: 40px;
            color: rgba(255,255,255,0.8);
            font-size: 14px;
            text-align: center;
        }

        @media screen and (max-width: 480px) {
            body {
                padding: 15px;
            }

            h1 {
                font-size: 28px;
                margin-bottom: 25px;
            }

            .game-modes {
                gap: 15px;
            }

            .mode-card {
                padding: 20px;
            }

            .mode-card .icon {
                font-size: 48px;
                margin-bottom: 12px;
            }

            .mode-card h2 {
                font-size: 20px;
            }

            .mode-card p {
                font-size: 14px;
            }

            .footer {
                margin-top: 30px;
                font-size: 13px;
            }
        }

        @media screen and (min-width: 768px) {
            h1 {
                font-size: 40px;
            }

            .mode-card {
                padding: 30px;
            }

            .mode-card .icon {
                font-size: 64px;
            }

            .mode-card h2 {
                font-size: 26px;
            }

            .mode-card p {
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <h1>🎨 你画我猜</h1>

    <div class="game-modes">
        <button class="mode-card classic" onclick="startClassicMode()">
            <div class="icon">🎮</div>
            <h2>普通模式</h2>
            <p>经典的你画我猜玩法。一位玩家绘画，完成后传给另一位玩家猜测答案，判断对错。</p>
        </button>

        <button class="mode-card racing" onclick="startRacingMode()">
            <div class="icon">🏎️</div>
            <h2>竞速模式</h2>
            <p>限时挑战！选择时间后开始，在规定时间内尽可能多地答对题目，挑战排行榜！</p>
        </button>

        <button class="mode-card duo" onclick="startDuoMode()">
            <div class="icon">👫</div>
            <h2>双人模式</h2>
            <p>两人对战！你画我猜，你猜我画，轮流进行，设定轮数，最终得分高者获胜！</p>
        </button>
    </div>

    <div class="footer">
        🎯 选择一个模式开始游戏吧！
    </div>

    <script>
        function startClassicMode() {
            window.location.href = 'classic.html';
        }

        function startRacingMode() {
            window.location.href = 'racing.html';
        }

        function startDuoMode() {
            window.location.href = 'duo.html';
        }
    </script>
</body>
</html>
